name = "spectux-leads-api"
main = "index.js" # Of waar je worker code precies staat
compatibility_date = "2024-03-04"

# 1. Jouw D1 Database koppeling (Plak hier de output van Stap 1)
[[d1_databases]]
binding = "DB"
database_name = "spectux_leads"
database_id = "VUL_HIER_JOUW_DATABASE_ID_IN"
# (Optioneel voor lokaal testen)
# preview_database_id = "DB" 

# 2. Publieke variabelen (Veilig om hier in te vullen)
[vars]
TELEGRAM_CHAT_ID = "JOUW_CHAT_ID"

# LET OP: Zet NOOIT je API keys (Gemini, Telegram Bot, Admin Secret) hardcoded in deze file!
# Die voegen we in Stap 4 toe via de terminal als 'Secrets'.
